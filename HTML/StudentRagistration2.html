
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Register Form</title>
    <link rel="stylesheet" href="./css/StudentRagistartion2.css" />
  </head>
  <body>
    <div class="container">
      <h1>Student Register Form</h1>
      <div class="form-data">
        <form>
          <table>
            <tr>
              <td><label for="name">Enter Firstname</label></td>
              <td>
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="Enter name here"
                  autocomplete="off"
                />
                <span class="message">(max 30 character a-z to A-Z)</span>
              </td>
            </tr>

            <tr>
              <td><label for="lname">Enter Lastname</label></td>
              <td>
                <input
                  type="text"
                  id="lname"
                  name="lname"
                  placeholder="Enter lastname here"
                  autocomplete="off"
                />
                <span class="message">(max 30 character a-z to A-Z)</span>
              </td>
            </tr>

            
  </body>
</html>
